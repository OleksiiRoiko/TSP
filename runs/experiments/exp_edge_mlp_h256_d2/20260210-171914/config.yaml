train:
  exp_id: exp_edge_mlp_h256_d2
  model_name: edge_mlp
  batch_size: 64
  hidden: 256
  dropout: 0.0
  depth: 2
  lr: 0.0008
  weight_decay: 5.0e-05
  train_root: runs/data/synthetic/train
  val_root: runs/data/synthetic/val
eval:
  device: cuda
  model_path: runs/experiments/exp_edge_mlp_h256_d2/latest.json
  data_roots:
  - runs/data/tsplib/processed
  - runs/data/synthetic/test
visualize:
  model: runs/experiments/exp_edge_mlp_h256_d2/latest.json
  targets:
  - npz_dir: runs/data/tsplib/processed
    limit: 0
  - npz_dir: runs/data/synthetic/test
    limit: 5
  out_dir: auto
