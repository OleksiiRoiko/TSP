train:
  exp_id: exp_edge_res_h256_d4_ccv1
  model_name: edge_res_mlp
  batch_size: 64
  hidden: 256
  dropout: 0.05
  depth: 4
  lr: 0.0005
  weight_decay: 5.0e-05
  train_root: runs/data/synthetic_concorde_v1/train
  val_root: runs/data/synthetic_concorde_v1/val
eval:
  device: cuda
  model_path: runs/experiments/exp_edge_res_h256_d4_ccv1/latest.json
  data_roots:
  - runs/data/tsplib/processed
  - runs/data/synthetic_concorde_v1/test
visualize:
  model: runs/experiments/exp_edge_res_h256_d4_ccv1/latest.json
  targets:
  - npz_dir: runs/data/tsplib/processed
    limit: 0
  - npz_dir: runs/data/synthetic_concorde_v1/test
    limit: 5
  out_dir: auto
