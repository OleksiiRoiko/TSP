base: ../config.yaml

train:
  exp_id: exp_edge_mlp_h256_d5
  model_name: edge_mlp_deep
  hidden: 256
  dropout: 0.1
  depth: 5
  epochs: 60
  lr: 0.0005
  weight_decay: 0.0001
  lr_scheduler: plateau
  lr_factor: 0.5
  lr_patience: 5
  lr_min: 1.0e-6
  early_stop: true
  early_patience: 5
  early_min_delta: 0.0001

eval:
  model_path: runs/experiments/{exp_id}/latest.json
  data_roots:
    - runs/data/tsplib/processed
    - runs/data/synthetic/test

visualize:
  model: runs/experiments/{exp_id}/latest.json
  targets:
    - npz_dir: runs/data/tsplib/processed
      limit: 0
    - npz_dir: runs/data/synthetic/test
      limit: 5
  out_dir: auto
