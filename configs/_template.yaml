base: ../config.yaml

train:
  # REQUIRED
  exp_id: exp_name

  # Model choice + hyper-params
  model_name: edge_mlp  # edge_mlp | edge_mlp_deep | edge_res_mlp
  hidden: 128
  depth: 2
  dropout: 0.0

  # Optional training overrides
  # epochs: 30
  # batch_size: 32
  # lr: 0.001
  # weight_decay: 0.0
  # lr_scheduler: plateau   # none | plateau
  # lr_factor: 0.5
  # lr_patience: 5
  # lr_min: 1.0e-6
  # val_every: 1
  # early_stop: true
  # early_patience: 10
  # early_min_delta: 0.0001
  # tf32: true
  # fused_optimizer: true
  # compile_model: false
  # compile_mode: reduce-overhead
  # seed: 0

  # Optional dataset overrides
  # train_root: runs/data/synthetic/train
  # val_root: runs/data/synthetic/val

# Evaluate on both TSPLIB and synthetic test in one run
eval:
  model_path: runs/experiments/{exp_id}/latest.json
  data_roots:
    - runs/data/tsplib/processed
    - runs/data/synthetic/test

# Visualize: all TSPLIB instances + 5 synthetic test instances
visualize:
  model: runs/experiments/{exp_id}/latest.json
  targets:
    - npz_dir: runs/data/tsplib/processed
      limit: 0
    - npz_dir: runs/data/synthetic/test
      limit: 5
  out_dir: auto
