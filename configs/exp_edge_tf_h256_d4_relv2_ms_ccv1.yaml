train:
  exp_id: exp_edge_tf_h256_d4_relv2_ms_ccv1
  model_name: edge_transformer
  batch_size: 64
  hidden: 256
  n_heads: 8
  ff_mult: 4
  edge_feat_mode: relative_sincos_v2
  dropout: 0.10
  depth: 4
  lr: 0.00040
  weight_decay: 0.00010

  train_root: runs/data/synthetic_concorde_v1/train
  val_root: runs/data/synthetic_concorde_v1/val

eval:
  device: cuda
  model_path: runs/experiments/{exp_id}/latest.json
  data_roots:
    - runs/data/tsplib/processed
  decode_multistart: 8
  decode_noise_std: 0.01
  decode_twoopt_passes: 20

visualize:
  model: runs/experiments/{exp_id}/latest.json
  decode_multistart: 8
  decode_noise_std: 0.01
  decode_twoopt_passes: 20
  targets:
    - npz_dir: runs/data/tsplib/processed
      limit: 0
  out_dir: auto
