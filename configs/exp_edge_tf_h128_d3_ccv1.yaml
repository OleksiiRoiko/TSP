train:
  exp_id: exp_edge_tf_h128_d3_ccv1
  model_name: edge_transformer
  batch_size: 64
  hidden: 128
  n_heads: 4
  ff_mult: 4
  edge_feat_mode: full
  dropout: 0.1
  depth: 3
  lr: 0.0005
  weight_decay: 0.0001

  train_root: runs/data/synthetic_concorde_v1/train
  val_root: runs/data/synthetic_concorde_v1/val

eval:
  device: cuda
  model_path: runs/experiments/{exp_id}/latest.json
  data_roots:
    - runs/data/tsplib/processed
  decode_multistart: 8
  decode_noise_std: 0.02
  decode_twoopt_passes: 40

visualize:
  model: runs/experiments/{exp_id}/latest.json
  decode_multistart: 8
  decode_noise_std: 0.02
  decode_twoopt_passes: 40
  targets:
    - npz_dir: runs/data/tsplib/processed
      limit: 0
  out_dir: auto
