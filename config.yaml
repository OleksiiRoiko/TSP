generate:
  out_root: runs/data/synthetic
  n_list: [20, 30, 40, 50, 75, 100]
  per_size_train: 10000
  per_size_val: 2000
  per_size_test: 200
  elkai_frac: 0.8
  seed: 0

tsplib:
  raw_root: runs/data/tsplib/raw
  out_root: runs/data/tsplib/processed
  download: true
  names: ["berlin52", "eil76", "pr76", "kroA100"]

train:
  exp_id: edge_mlp_v1
  train_root: runs/data/synthetic/train
  val_root: runs/data/synthetic/val
  epochs: 20
  batch_size: 8
  lr: 0.001
  seed: 0
  model_name: edge_mlp          # shallow: 2 hidden layers (see registry)
  hidden: 128                   # hidden width for edge_mlp
  dropout: 0.0
  depth: 2                      # hidden layers (shallow). For deep, change model/depth.

eval:
  model_path: runs/models/edge_mlp_v1_edge_mlp_in10_h256_d5_bs8_lr0.001_ep20_seed0_20251123-132928_best.pt
  data_root: runs/data/tsplib/processed
  device: cpu
  save_json: runs/evals/tsplib_eval_edge_mlp_v1_edge_mlp_in10_h256_d5_bs8_lr0.001_ep20_seed0_20251123-132928_best.json
  run_twoopt: true
  seed: 0

visualize:
  mode: predict                      # "dataset" or "predict"
  npz_dir: runs/data/tsplib/processed
  model: runs/models/edge_mlp_v1_edge_mlp_in10_h128_d3_bs8_lr0.001_ep20_seed0_20251123-125836_best.pt  # only used in mode=predict
  out_dir: runs/figs/tsplib_edge_mlp_v1_edge_mlp_in10_h128_d3_bs8_lr0.001_ep20_seed0_20251123-125836_best
  figsize: [11.0, 5.5]
  dpi: 150
  limit: 0                           # 0 = all

qa:
  root: runs/data/tsplib/processed
  check_gt: true
  coverage: true
  lengths: true
  csv: runs/qa_report.csv
