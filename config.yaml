generate:
  out_root: runs/data/synthetic
  n_list: [100]
  per_size_train: 10000
  per_size_val: 2000
  per_size_test: 200
  elkai_frac: 0.8
  seed: 0

tsplib:
  raw_root: runs/data/tsplib/raw
  out_root: runs/data/tsplib/processed
  download: true
  names: ["berlin52", "eil76", "pr76", "kroA100"]

train:
  exp_id: edge_mlp_v2_more-data_same_model
  train_root: runs/data/synthetic/train
  val_root: runs/data/synthetic/val
  epochs: 10
  batch_size: 16
  lr: 0.001
  seed: 0
  model_name: edge_mlp          # from registry
  hidden: 128                        # any int (works for both models)
  dropout: 0.1
  feature_dim: 10                    # ← NEW: any integer; features auto pad/truncate
  depth: 5                     # NEW: number of hidden layers

eval:
  model_path: runs/models/edge_mlp_v2_more-data_same_model_latest.pt
  data_root: runs/data/tsplib/processed
  device: cpu
  save_json: runs/evals/tsplib_eval3.json
  run_twoopt: true
  feature_dim: null                  # null → infer from checkpoint; else any int
  seed: 0

visualize:
  mode: predict                      # "dataset" or "predict"
  npz_dir: runs/data/tsplib/processed
  model: runs/models/edge_mlp_v2_more-data_same_model_latest.pt  # only used in mode=predict
  out_dir: runs/figs/tsplib_big_model5x128`
  figsize: [11.0, 5.5]
  dpi: 150
  feature_dim: null                  # null → infer from checkpoint; else any int
  limit: 0                           # 0 = all

qa:
  root: runs/data/tsplib/processed
  check_gt: true
  coverage: true
  k: 5                              # kNN coverage checker; complete graph → coverage==1
  lengths: true
  csv: runs/qa_report.csv
